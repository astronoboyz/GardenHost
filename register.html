<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Daftar - SkyHost</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
  <div class="w-full max-w-md p-8">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold">Daftar SkyHost</h1>
      <p class="text-slate-500">Buat akun untuk mengelola layanan cloud Anda</p>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-xl">
      <form id="registerForm" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Alamat Email</label>
          <input id="reg_email" type="email" required class="w-full px-3 py-2 border rounded" placeholder="email@contoh.com">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Kata Sandi</label>
          <input id="reg_password" type="password" required class="w-full px-3 py-2 border rounded" placeholder="Minimal 6 karakter">
        </div>
        <div id="registerMessage"></div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded">Daftar</button>
      </form>
      <div class="mt-4 text-center text-sm text-slate-600">Sudah punya akun? <a href="/" class="text-blue-600">Masuk</a></div>
    </div>
  </div>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
