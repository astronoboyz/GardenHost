<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard - SkyHost</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header class="bg-white shadow p-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="logo-mark bg-blue-600 text-white"><i class="fas fa-cloud"></i></div>
      <h1 class="text-lg font-bold">SkyHost Dashboard</h1>
    </div>
    <div>
      <button id="logoutBtn" class="px-3 py-1 bg-red-500 text-white rounded">Logout</button>
    </div>
  </header>

  <main class="p-8">
    <div id="profileArea">Memuat profil...</div>
  </main>

  <script>
    async function loadProfile(){
      const res = await fetch('/api/profile');
      if(!res.ok) return window.location.href = '/';
      const data = await res.json();
      if(data && data.user){
        document.getElementById('profileArea').innerHTML = `<h2 class="text-2xl font-semibold">Selamat datang, ${data.user.email}</h2><p class="text-slate-600 mt-2">Terdaftar: ${data.user.created_at}</p>`;
      }
    }
    loadProfile();
  </script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
